<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 Metacognition — 破界</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="/metacognition/fonts.css">
<style>
/*
   Fonts: Latin self-hosted (zero external requests), Chinese via CDN with unicode-range.
   See fonts.css for @font-face declarations.
 */

  /* ── Dark Theme (default) ── */
  :root, [data-theme="dark"] {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface-hover: #242424;
    --text: #e8e4dd;
    --text-secondary: #8a857c;
    --text-muted: #5c5852;
    --accent: #c9a96e;
    --accent-glow: rgba(201, 169, 110, 0.12);
    --border: #2a2a2a;
    --tag-bg: rgba(201, 169, 110, 0.1);
    --tag-text: #c9a96e;
    --gradient-1: #c9a96e;
    --gradient-2: #8b7355;
    --toggle-bg: #1a1a1a;
    --toggle-border: #2a2a2a;
  }

  [data-theme="light"] {
    --bg: #faf8f5;
    --surface: #ffffff;
    --surface-hover: #f5f2ed;
    --text: #1a1815;
    --text-secondary: #6b6358;
    --text-muted: #9b9388;
    --accent: #8b6914;
    --accent-glow: rgba(139, 105, 20, 0.06);
    --border: #e8e4dd;
    --tag-bg: rgba(139, 105, 20, 0.08);
    --tag-text: #8b6914;
    --gradient-1: #8b6914;
    --gradient-2: #5c4a1e;
    --toggle-bg: #ffffff;
    --toggle-border: #d4cfc6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', 'Noto Serif', Georgia, 'Times New Roman', serif;
    line-height: 1.8;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* ── Hero ── */
  .hero {
    position: relative;
    padding: 100px 24px 64px;
    text-align: center;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 50% 30%, var(--accent-glow) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(139, 115, 85, 0.06) 0%, transparent 50%);
    animation: heroGlow 8s ease-in-out infinite alternate;
  }

  @keyframes heroGlow {
    0% { transform: scale(1) translate(0, 0); opacity: 0.8; }
    100% { transform: scale(1.1) translate(-2%, -2%); opacity: 1; }
  }

  .hero-content { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; }

  .hero-badge {
    display: inline-block;
    padding: 5px 14px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 28px;
    backdrop-filter: blur(12px);
  }

  .hero h1 {
    font-size: clamp(2rem, 5vw, 3.4rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 18px;
    background: linear-gradient(135deg, var(--text) 0%, var(--text-secondary) 60%, var(--gradient-1) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-subtitle {
    font-size: 1.05rem;
    color: var(--text-secondary);
    max-width: 480px;
    margin: 0 auto 32px;
  }

  .hero-quote {
    font-style: italic;
    color: var(--text-muted);
    font-size: 0.9rem;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    max-width: 420px;
    margin: 0 auto;
  }

  /* ── Navigation ── */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13, 13, 13, 0.88);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  [data-theme="light"] .nav {
    background: rgba(250, 248, 245, 0.88);
  }

  .nav-inner {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    gap: 10px;
  }

  .nav-brand {
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.8rem;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-decoration: none;
    white-space: nowrap;
  }

  .nav-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .nav-links {
    display: flex;
    gap: 14px;
    list-style: none;
    align-items: center;
  }

  .nav-links a {
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.72rem;
    color: var(--text-secondary);
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--text); }

  /* ── Toggle Buttons ── */
  .toggle-btn {
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.68rem;
    background: var(--toggle-bg);
    color: var(--text-secondary);
    border: 1px solid var(--toggle-border);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .toggle-btn:hover {
    color: var(--text);
    border-color: var(--accent);
  }

  /* ── Main Layout ── */
  .main { max-width: 760px; margin: 0 auto; padding: 0 24px 72px; }

  /* ── Edition Cards ── */
  .section-header {
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.68rem;
    color: var(--text-muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin: 48px 0 18px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .edition-card {
    display: block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px 28px;
    margin-bottom: 10px;
    text-decoration: none;
    transition: all 0.25s ease;
    cursor: pointer;
  }

  .edition-card:hover {
    border-color: var(--accent);
    background: var(--surface-hover);
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.12);
  }

  .edition-number {
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.68rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .edition-title {
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .edition-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 12px;
  }

  .tag {
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.65rem;
    padding: 3px 9px;
    background: var(--tag-bg);
    color: var(--tag-text);
    border-radius: 100px;
  }

  /* ── Article View ── */
  .article { animation: fadeIn 0.4s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .article-header {
    padding: 48px 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }

  .article-number {
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.72rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }

  .article-header h1 {
    font-size: clamp(1.5rem, 3.5vw, 2.2rem);
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 12px;
  }

  .article-date {
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .article-body h2 {
    font-size: 1.25rem;
    font-weight: 600;
    margin: 36px 0 12px;
    color: var(--text);
    scroll-margin-top: 72px;
  }

  .article-body h3 {
    font-size: 1.05rem;
    font-weight: 600;
    margin: 24px 0 10px;
    color: var(--accent);
  }

  .article-body p {
    margin-bottom: 14px;
    color: var(--text-secondary);
  }

  .article-body strong {
    color: var(--text);
    font-weight: 600;
  }

  .article-body blockquote {
    border-left: 3px solid var(--accent);
    padding: 10px 18px;
    margin: 18px 0;
    background: var(--surface);
    border-radius: 0 6px 6px 0;
    color: var(--text-secondary);
    font-style: italic;

  .article-body blockquote p { margin-bottom: 0; }

  .article-body blockquote strong { color: var(--accent); }

  .article-body code {
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.85em;
    background: var(--surface);
    padding: 2px 5px;
    border-radius: 4px;
    color: var(--accent);
  }

  .article-body pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin: 16px 0;
    overflow-x: auto;
    font-size: 0.85rem;
    line-height: 1.65;
  }

  .article-body pre code {
    background: none;
    padding: 0;
    color: var(--text);
    font-size: inherit;
    line-height: inherit;
  }

  .article-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 28px 0;
  }

  .article-body ul, .article-body ol {
    margin: 10px 0 14px 20px;
    color: var(--text-secondary);
  }

  .article-body li {
    margin-bottom: 4px;
    line-height: 1.7;
  }

  .article-body li p { margin-bottom: 0; }

  .article-body a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dotted var(--accent);
  }

  .article-body a:hover { border-bottom-style: solid; }

  /* ── Tables ── */
  .article-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 18px 0;
    font-size: 0.88rem;
  }

  .article-body th {
    text-align: left;
    padding: 9px 12px;
    border-bottom: 2px solid var(--accent);
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    color: var(--accent);
    font-weight: 500;
  }

  .article-body td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text-secondary);
  }

  .article-body tr:last-child td { border-bottom: none; }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    text-decoration: none;
    margin-bottom: 20px;
    transition: color 0.2s;
  }

  .back-link:hover { color: var(--text); }

  /* ── Footer ── */
  .footer {
    max-width: 800px;
    margin: 0 auto;
    padding: 48px 24px 36px;
    border-top: 1px solid var(--border);
    text-align: center;
  }

  .footer-inner {
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
  }

  .footer-inner a { color: var(--accent); text-decoration: none; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .hero { padding: 64px 20px 48px; }
    .hero h1 { font-size: 1.8rem; }
    .hero-subtitle { font-size: 0.95rem; }
    .main { padding: 0 16px 48px; }
    .edition-card { padding: 18px 18px; }
    .edition-title { font-size: 1.1rem; }
    .article-header { padding: 32px 0 20px; }
    .article-body h2 { font-size: 1.15rem; margin-top: 28px; }
    .article-body pre { padding: 12px 14px; font-size: 0.8rem; }
    .article-body table { font-size: 0.8rem; }
    .article-body th, .article-body td { padding: 6px 8px; }
    .nav-inner { gap: 4px; }
    .nav-links { gap: 8px; }
    .toggle-btn { padding: 3px 7px; font-size: 0.62rem; }
    .section-header { margin-top: 36px; }
  }

  .loading {
    text-align: center;
    padding: 72px 0;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.82rem;
  }

  .loading-dot {
    display: inline-block;
    animation: dotPulse 1.4s infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(4) { animation-delay: 0.4s; }

  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.3; }
    40% { opacity: 1; }
  }

  .hidden { display: none !important; }

  /* ── Comments (Utterances) ── */
  #comments {
    margin-top: 48px;
    padding-top: 36px;
    border-top: 1px solid var(--border);
  }
  #comments .utterances {
    max-width: 100%;
  }

<script>
const BASE_PATH = '/metacognition/';
let currentLang = 'zh';
let currentTheme = 'dark';
let editions = [];

// ── Cookie helpers ──
function setCookie(name, value, days) {
  const d = new Date();
  d.setTime(d.getTime() + (days * 86400000));
  document.cookie = name + '=' + value + ';path=/;expires=' + d.toUTCString() + ';SameSite=Lax';
}
function getCookie(name) {
  const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
  return match ? match[2] : null;
}

// ── Lang ──
function initLang() {
  const saved = getCookie('mc-lang');
  if (saved === 'zh' || saved === 'en') { currentLang = saved; }
  else { currentLang = (navigator.language || '').startsWith('zh') ? 'zh' : 'en'; }
  applyLang();
}
function toggleLang() {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  setCookie('mc-lang', currentLang, 365);
  applyLang();
  // Reload article if viewing one
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('edition');
  if (slug && !document.getElementById('index-view').classList.contains('hidden') === false) {
    // We're on article view — check
  }
  if (!document.getElementById('index-view').classList.contains('hidden')) {
    buildIndex(editions);
  } else if (slug) {
    loadEdition(slug);
  }
}
function applyLang() {
  document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
  document.querySelectorAll('[data-zh][data-en]').forEach(el => {
    el.textContent = el.getAttribute('data-' + currentLang);
  });
  document.getElementById('lang-toggle').textContent = currentLang === 'zh' ? '中' : 'En';
}

// ── Theme ──
function initTheme() {
  const saved = getCookie('mc-theme');
  if (saved === 'light' || saved === 'dark') { currentTheme = saved; }
  else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) { currentTheme = 'light'; }
  applyTheme();
  if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      if (!getCookie('mc-theme')) { currentTheme = e.matches ? 'dark' : 'light'; applyTheme(); }
    });
  }
}
function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  setCookie('mc-theme', currentTheme, 365);
  applyTheme();
  // Refresh comments if loaded
  if (commentsLoaded && document.getElementById('comments').children.length > 0) {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('edition');
    if (slug) loadComments(slug);
  }
}
function applyTheme() {
  document.documentElement.setAttribute('data-theme', currentTheme);
  document.getElementById('theme-toggle').textContent = currentTheme === 'dark' ? '🌙' : '☀️';
}

// ── Markdown Parser ──
function parseMarkdown(md) {
  const placeholders = [];
  const stash = (html) => { placeholders.push(html); return '\x00' + (placeholders.length - 1) + '\x00'; };

  // 1. Extract fenced code blocks
  md = md.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const cls = lang ? ' class="language-' + lang + '"' : '';
    return stash('<pre' + cls + '><code>' + escapeHTML(code.trimEnd()) + '</code></pre>');
  });

  // 2. Extract inline code
  md = md.replace(/`([^`]+)`/g, (_, code) => stash('<code>' + escapeHTML(code) + '</code>'));

  // 3. Parse tables (must be before paragraph wrapping)
  md = md.replace(/(^\|.+\|\n\|[-| :]+\|\n((?:\|.+\|\n?)+))/gm, (match) => {
    const lines = match.trim().split('\n');
    if (lines.length < 2) return match;
    let html = '<table>';
    // Header
    html += '<thead><tr>' + lines[0].split('|').filter(c => c.trim()).map(c => '<th>' + c.trim() + '</th>').join('') + '</tr></thead>';
    // Body (skip separator line)
    html += '<tbody>';
    for (let i = 2; i < lines.length; i++) {
      html += '<tr>' + lines[i].split('|').filter(c => c.trim()).map(c => '<td>' + c.trim() + '</td>').join('') + '</tr>';
    }
    html += '</tbody></table>';
    return stash(html);
  });

  // 4. Headers
  md = md.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  md = md.replace(/^## (.+)$/gm, '<h2>$1</h2>');

  // 5. Horizontal rules
  md = md.replace(/^---$/gm, stash('<hr>'));

  // 6. Blockquotes
  md = md.replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>');
  // Merge consecutive blockquotes
  md = md.replace(/<\/blockquote>\n<blockquote>/g, '<br>');

  // 7. Bold and italic (after headers so # aren't caught)
  md = md.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  md = md.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // 8. Links
  md = md.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // 9. Unordered lists — group consecutive `- ` lines
  md = md.replace(/((?:^- .+\n?)+)/gm, (block) => {
    const items = block.trim().split('\n').map(l => '<li>' + l.replace(/^- /, '') + '</li>').join('');
    return stash('<ul>' + items + '</ul>');
  });

  // 10. Ordered lists — group consecutive `N. ` lines
  md = md.replace(/((?:^\d+\. .+\n?)+)/gm, (block) => {
    const items = block.trim().split('\n').map(l => '<li>' + l.replace(/^\d+\. /, '') + '</li>').join('');
    return stash('<ol>' + items + '</ol>');
  });

  // 11. Wrap remaining text in paragraphs
  md = md.replace(/\n\n+/g, '</p><p>');
  md = md.replace(/\n/g, '<br>');
  md = '<p>' + md + '</p>';

  // 12. Clean up empty paragraphs and fix nesting
  md = md.replace(/<p>\s*<\/p>/g, '');
  md = md.replace(/<p><(h[23]|ul|ol|blockquote|table|pre|hr)/g, '<$1');
  md = md.replace(/(\/h[23]>|\/ul>|\/ol>|\/blockquote>|\/table>|\/pre>|\/hr>)<\/p>/g, '$1');
  md = md.replace(/<br><\/(h[23]|ul|ol|blockquote|table)>/g, '</$1>');

  // 13. Restore placeholders
  md = md.replace(/\x00(\d+)\x00/g, (_, i) => placeholders[parseInt(i)]);

  return md;
}

function escapeHTML(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Frontmatter parser ──
function parseFrontmatter(md) {
  const match = md.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (!match) return { meta: {}, body: md };
  const meta = {};
  match[1].split('\n').forEach(line => {
    const m = line.match(/^(\w+):\s*(.+)$/);
    if (m) {
      let val = m[2].trim();
      if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1);
      if (m[1] === 'tags') {
        val = val.replace(/[\[\]]/g, '').split(',').map(s => s.trim().replace(/['"]/g, ''));
      }
      meta[m[1]] = val;
    }
  });
  return { meta, body: match[2].trim() };
}

// ── Build index ──
function buildIndex(eds) {
  editions = eds;
  const list = document.getElementById('edition-list');
  list.innerHTML = eds.sort((a, b) => b.date.localeCompare(a.date)).map(e => {
    const title = currentLang === 'en' && e.title_en ? e.title_en : e.title;
    const tags = currentLang === 'en' && e.tags_en ? e.tags_en : e.tags;
    return `<a href="${BASE_PATH}?edition=${e.slug}" class="edition-card" onclick="event.preventDefault();loadEdition('${e.slug}')">
      <div class="edition-number">#${String(e.num).padStart(3,'0')} · ${e.dateDisplay}</div>
      <div class="edition-title">${title}</div>
      <div class="edition-tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </a>`;
  }).join('');
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('index-view').classList.remove('hidden');
  document.getElementById('article-view').classList.add('hidden');
  window.scrollTo(0, 0);
}

// ── Load edition ──
async function loadEdition(slug) {
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('index-view').classList.add('hidden');
  document.getElementById('article-view').classList.add('hidden');

  const suffix = currentLang === 'en' ? '.en.md' : '.md';
  try {
    const resp = await fetch(BASE_PATH + 'issues/' + slug + suffix);
    if (!resp.ok) throw new Error('Edition not found');
    const md = await resp.text();
    const { meta, body } = parseFrontmatter(md);
    const title = meta.title || slug;
    const tags = meta.tags || [];
    const edMeta = editions.find(e => e.slug === slug);
    const dateDisplay = edMeta ? edMeta.dateDisplay : (meta.date || slug);
    const numStr = meta.edition ? '#' + String(meta.edition).padStart(3, '0') : '';

    const tagsHTML = tags.length ? `<div class="edition-tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : '';

    document.getElementById('article-view').innerHTML = `
      <a href="${BASE_PATH}" class="back-link" onclick="event.preventDefault();buildIndex(editions)">
        <span data-zh="← 返回目录" data-en="← Back to Index">← 返回目录</span>
      </a>
      <article class="article">
        <div class="article-header">
          <div class="article-number">Edition ${numStr}</div>
          <h1>${title}</h1>
          <div class="article-date">${dateDisplay}</div>
          ${tagsHTML}
        </div>
        <div class="article-body">${parseMarkdown(body)}</div>
        <div id="comments"></div>
      </article>`;

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('article-view').classList.remove('hidden');
    applyLang();
    window.scrollTo(0, 0);
    if (history.pushState) history.pushState(null, '', BASE_PATH + '?edition=' + slug);
    loadComments(slug);
  } catch (err) {
    document.getElementById('loading').innerHTML = '<span data-zh="加载失败" data-en="Load failed">加载失败</span>';
    applyLang();
  }
}

// ── Comments (Utterances) ──
let commentsLoaded = false;

function loadComments(slug) {
  const container = document.getElementById('comments');
  if (!container) return;

  // Clear previous
  container.innerHTML = '';

  // Create Utterances script
  const script = document.createElement('script');
  script.src = 'https://utteranc.es/client.js';
  script.async = true;
  script.crossOrigin = 'anonymous';
  script.setAttribute('repo', 'barretlee/metacognition');
  script.setAttribute('issue-term', 'pathname');
  script.setAttribute('label', '💬 comment');
  script.setAttribute('theme', currentTheme === 'dark' ? 'photon-dark' : 'github-light');
  container.appendChild(script);
  commentsLoaded = true;
}

// ── Init ──
document.getElementById('lang-toggle').addEventListener('click', toggleLang);
document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
initTheme();
initLang();

fetch(BASE_PATH + 'editions.json')
  .then(r => r.json())
  .then(data => {
    buildIndex(data.editions);
    const params = new URLSearchParams(window.location.search);
    if (params.get('edition')) loadEdition(params.get('edition'));
  })
  .catch(() => {
    document.getElementById('loading').innerHTML = '<span data-zh="加载失败" data-en="Load failed">加载失败</span>';
    applyLang();
  });

window.addEventListener('popstate', () => {
  const slug = new URLSearchParams(window.location.search).get('edition');
  slug ? loadEdition(slug) : buildIndex(editions);
});
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/metacognition/sw.js');
}
</script>
