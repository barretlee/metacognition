    border-radius: 2px;

  }

      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" class="search-input" data-zh-placeholder="搜索文章..." data-en-placeholder="Search articles..." placeholder="搜索文章..." autocomplete="off">
      <button class="search-close" id="search-close" title="Close">✕</button>
    </div>
    <div class="search-results" id="search-results">
      <div class="search-empty" data-zh="输入关键词开始搜索" data-en="Type to search">输入关键词开始搜索</div>
    </div>
    <div class="search-footer">
      <span data-zh="共" data-en="">共</span> <span id="search-count">0</span> <span data-zh="篇" data-en=" results">篇</span>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <span data-zh="由" data-en="Built by ">由</span> <a href="https://github.com/barretlee">Barret Lee</a> · <a href="https://github.com/barretlee/metacognition">metacognition</a>
  </div>
</footer>

<script>
const BASE_PATH = '/metacognition/';
let currentLang = 'zh';
let currentTheme = 'dark';
let editions = [];

// ── Cookie helpers ──
function setCookie(name, value, days) {
  const d = new Date();
  d.setTime(d.getTime() + (days * 86400000));
  document.cookie = name + '=' + value + ';path=/;expires=' + d.toUTCString() + ';SameSite=Lax';
}
function getCookie(name) {
  const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
  return match ? match[2] : null;
}

// ── Lang ──
function initLang() {
  const saved = getCookie('mc-lang');
  if (saved === 'zh' || saved === 'en') { currentLang = saved; }
  else { currentLang = (navigator.language || '').startsWith('zh') ? 'zh' : 'en'; }
  applyLang();
}
function toggleLang() {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  setCookie('mc-lang', currentLang, 365);
  applyLang();
  // Derive slug from current URL path
  var pathSlug = window.location.pathname.replace(/\/metacognition\//, '').replace(/\/$/, '').replace(/^en\//, '');
  var isArticleView = !document.getElementById('article-view').classList.contains('hidden');
  if (isArticleView && pathSlug && pathSlug !== 'index.html') {
    var ed = editions.find(e => e.slug_en === pathSlug || e.slug === pathSlug);
    if (ed) loadEdition(ed.slug);
  } else if (!isArticleView) {
    buildIndex(editions);
  }
}
function applyLang() {
  document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
  document.querySelectorAll('[data-zh][data-en]').forEach(el => {
    el.textContent = el.getAttribute('data-' + currentLang);
  });
  document.getElementById('lang-toggle').textContent = currentLang === 'zh' ? '中' : 'En';
}

// ── Theme ──
function initTheme() {
  const saved = getCookie('mc-theme');
  if (saved === 'light' || saved === 'dark') { currentTheme = saved; }
  else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) { currentTheme = 'light'; }
  applyTheme();
  if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      if (!getCookie('mc-theme')) { currentTheme = e.matches ? 'dark' : 'light'; applyTheme(); }
    });
  }
}
function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  setCookie('mc-theme', currentTheme, 365);
  applyTheme();
  // Refresh comments if loaded
  if (commentsLoaded && document.getElementById('comments').children.length > 0) {
    var pathSlug = window.location.pathname.replace(/\/metacognition\//, '').replace(/\/$/, '').replace(/^en\//, '');
    if (pathSlug && pathSlug !== 'index.html') {
      var ed = editions.find(e => e.slug_en === pathSlug || e.slug === pathSlug);
      if (ed) loadComments(ed.slug);
    }
  }
}
function applyTheme() {
  document.documentElement.setAttribute('data-theme', currentTheme);
  document.getElementById('theme-toggle').textContent = currentTheme === 'dark' ? '🌙' : '☀️';
}

// ── Markdown Parser ──
function parseMarkdown(md) {
  const placeholders = [];
  const stash = (html) => { placeholders.push(html); return '\x00' + (placeholders.length - 1) + '\x00'; };

  // 1. Extract fenced code blocks
  md = md.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const cls = lang ? ' class="language-' + lang + '"' : '';
    return stash('<pre' + cls + '><code>' + escapeHTML(code.trimEnd()) + '</code></pre>');
  });

  // 2. Extract inline code
  md = md.replace(/`([^`]+)`/g, (_, code) => stash('<code>' + escapeHTML(code) + '</code>'));

  // 3. Parse tables (must be before paragraph wrapping)
  md = md.replace(/(^\|.+\|\n\|[-| :]+\|\n((?:\|.+\|\n?)+))/gm, (match) => {
    const lines = match.trim().split('\n');
    if (lines.length < 2) return match;
    let html = '<table>';
    // Header
    html += '<thead><tr>' + lines[0].split('|').filter(c => c.trim()).map(c => '<th>' + c.trim() + '</th>').join('') + '</tr></thead>';
    // Body (skip separator line)
    html += '<tbody>';
    for (let i = 2; i < lines.length; i++) {
      html += '<tr>' + lines[i].split('|').filter(c => c.trim()).map(c => '<td>' + c.trim() + '</td>').join('') + '</tr>';
    }
    html += '</tbody></table>';
    return stash(html);
  });

  // 4. Headers
  md = md.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  md = md.replace(/^## (.+)$/gm, '<h2>$1</h2>');

  // 5. Horizontal rules
  md = md.replace(/^---$/gm, stash('<hr>'));

  // 6. Blockquotes
  md = md.replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>');
  // Merge consecutive blockquotes
  md = md.replace(/<\/blockquote>\n<blockquote>/g, '<br>');

  // 7. Bold and italic (after headers so # aren't caught)
  md = md.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  md = md.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // 8. Links
  md = md.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // 9. Unordered lists — group consecutive `- ` lines
  md = md.replace(/((?:^- .+\n?)+)/gm, (block) => {
    const items = block.trim().split('\n').map(l => '<li>' + l.replace(/^- /, '') + '</li>').join('');
    return stash('<ul>' + items + '</ul>');
  });

  // 10. Ordered lists — group consecutive `N. ` lines
  md = md.replace(/((?:^\d+\. .+\n?)+)/gm, (block) => {
    const items = block.trim().split('\n').map(l => '<li>' + l.replace(/^\d+\. /, '') + '</li>').join('');
    return stash('<ol>' + items + '</ol>');
  });

  // 11. Wrap remaining text in paragraphs
  md = md.replace(/\n\n+/g, '</p><p>');
  md = md.replace(/\n/g, '<br>');
  md = '<p>' + md + '</p>';

  // 12. Clean up empty paragraphs and fix nesting
  md = md.replace(/<p>\s*<\/p>/g, '');
  md = md.replace(/<p><(h[23]|ul|ol|blockquote|table|pre|hr)/g, '<$1');
  md = md.replace(/(\/h[23]>|\/ul>|\/ol>|\/blockquote>|\/table>|\/pre>|\/hr>)<\/p>/g, '$1');
  md = md.replace(/<br><\/(h[23]|ul|ol|blockquote|table)>/g, '</$1>');

  // 13. Restore placeholders
  md = md.replace(/\x00(\d+)\x00/g, (_, i) => placeholders[parseInt(i)]);

  return md;
}

function escapeHTML(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Frontmatter parser ──
function parseFrontmatter(md) {
  const match = md.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (!match) return { meta: {}, body: md };
  const meta = {};
  match[1].split('\n').forEach(line => {
    const m = line.match(/^(\w+):\s*(.+)$/);
    if (m) {
      let val = m[2].trim();
      if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1);
      if (m[1] === 'tags') {
        val = val.replace(/[\[\]]/g, '').split(',').map(s => s.trim().replace(/['"]/g, ''));
      }
      meta[m[1]] = val;
    }
  });
  return { meta, body: match[2].trim() };
}

// ── Build index ──
function buildIndex(eds) {
  editions = eds;
  const list = document.getElementById('edition-list');
  list.innerHTML = eds.sort((a, b) => b.date.localeCompare(a.date)).map(e => {
    const title = currentLang === 'en' && e.title_en ? e.title_en : e.title;
    const tags = currentLang === 'en' && e.tags_en ? e.tags_en : e.tags;
    const hrefSlug = e.slug_en || e.slug;
    const langPfx = currentLang === 'en' ? 'en/' : '';
    return `<a href="${BASE_PATH}${langPfx}${hrefSlug}" class="edition-card" onclick="event.preventDefault();loadEdition('${e.slug}')">
      <div class="edition-number">${e.dateDisplay}</div>
      <div class="edition-title">${title}</div>
      <div class="edition-tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </a>`;
  }).join('');
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('index-view').classList.remove('hidden');
  document.getElementById('article-view').classList.add('hidden');
  // Reset title & SEO
  document.getElementById('page-title').textContent = 'Metacognition — 破界';
  document.title = 'Metacognition — 破界';
  document.querySelector('meta[name="description"]').setAttribute('content', '破界期刊 — 认知之外，思维之疆。跨域思考认知科学、哲学、投资、陌生领域。');
  document.querySelector('meta[property="og:title"]').setAttribute('content', 'Metacognition — 破界期刊');
  document.querySelector('meta[property="og:url"]').setAttribute('content', 'https://barretlee.github.io/metacognition/');
  window.scrollTo(0, 0);
}

// ── Load edition ──
async function loadEdition(slug) {
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('index-view').classList.add('hidden');
  document.getElementById('article-view').classList.add('hidden');

  const suffix = currentLang === 'en' ? '.en.md' : '.md';
  try {
    const resp = await fetch(BASE_PATH + 'issues/' + slug + suffix);
    if (!resp.ok) throw new Error('Edition not found');
    const md = await resp.text();
    const { meta, body } = parseFrontmatter(md);
    const title = meta.title || slug;
    const tags = meta.tags || [];
    const edMeta = editions.find(e => e.slug === slug);
    const dateDisplay = edMeta ? edMeta.dateDisplay : (meta.date || slug);

    const tagsHTML = tags.length ? `<div class="edition-tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : '';

    document.getElementById('article-view').innerHTML = `
      <a href="${BASE_PATH}" class="back-link" onclick="event.preventDefault();buildIndex(editions)">
        <span data-zh="← 返回目录" data-en="← Back to Index">← 返回目录</span>
      </a>
      <article class="article">
        <div class="article-header">
          <h1>${title}</h1>
          <div class="article-date">${dateDisplay}</div>
          ${tagsHTML}
        </div>
        <div class="article-body">${parseMarkdown(body)}</div>
        <div id="comments"></div>
      </article>
      <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": "${title.replace(/"/g, '\\"')}",
        "datePublished": "${dateDisplay}",
        "author": { "@type": "Person", "name": "Barret Lee", "url": "https://www.barretlee.com" },
        "publisher": { "@type": "Person", "name": "Barret Lee", "url": "https://www.barretlee.com" },
        "mainEntityOfPage": { "@type": "WebPage", "@id": "https://barretlee.github.io/metacognition/" }
      }
      <\/script>`;

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('article-view').classList.remove('hidden');
    applyLang();
    window.scrollTo(0, 0);

    // Clean URL: never leave ?p= residue in address bar
    const edMeta2 = editions.find(e => e.slug === slug);
    const cleanPath = edMeta2 && edMeta2.slug_en ? edMeta2.slug_en : slug;
    const langPrefix = currentLang === 'en' ? 'en/' : '';
    if (history.replaceState) {
      history.replaceState(null, '', BASE_PATH + langPrefix + cleanPath);
    }

    // Dynamic title & SEO
    document.getElementById('page-title').textContent = title + ' — 破界';
    document.title = title + ' — 破界';
    document.querySelector('meta[name="description"]').setAttribute('content', (edMeta2 ? edMeta2.title : title) + '。跨域思考，破界认知。');
    document.querySelector('meta[property="og:title"]').setAttribute('content', title + ' — 破界期刊');
    document.querySelector('meta[property="og:description"]').setAttribute('content', (edMeta2 ? edMeta2.title : title));
    document.querySelector('meta[property="og:url"]').setAttribute('content', 'https://barretlee.github.io' + BASE_PATH + langPrefix + cleanPath);
    document.querySelector('meta[name="twitter:title"]').setAttribute('content', title + ' — 破界期刊');
    document.querySelector('meta[name="twitter:description"]').setAttribute('content', (edMeta2 ? edMeta2.title : title));

    showCommentTrigger(slug);
  } catch (err) {
    document.getElementById('loading').innerHTML = '<span data-zh="加载失败" data-en="Load failed">加载失败</span>';
    applyLang();
  }
}

// ── Comments (Giscus — GitHub Discussions, better SPA/OAuth support) ──
let commentsLoaded = false;

function showCommentTrigger(slug) {
  const container = document.getElementById('comments');
  if (!container) return;
  container.innerHTML = '<div class="comments-trigger" id="comment-trigger" style="cursor:pointer;text-align:center;padding:24px;border:1px dashed var(--border);border-radius:8px;transition:all 0.2s" onmouseenter="this.style.borderColor=\'var(--accent)\';this.style.background=\'var(--accent-glow)\'" onmouseleave="this.style.borderColor=\'var(--border)\';this.style.background=\'transparent\'"><span style="font-size:1.2rem">💬</span><span data-zh="点击加载评论" data-en="Click to load comments" style="display:block;margin-top:6px;color:var(--text-secondary);font-family:\'JetBrains Mono\',monospace;font-size:0.8rem">点击加载评论</span><span style="display:block;margin-top:4px;color:var(--text-muted);font-size:0.68rem" data-zh="使用 GitHub 登录（首次需授权 Giscus App）" data-en="Sign in with GitHub (first time requires Giscus App authorization)">使用 GitHub 登录（首次需授权 Giscus App）</span></div>';
  applyLang();
  document.getElementById('comment-trigger').onclick = function() { loadComments(slug); };
}

function loadComments(slug) {
  var container = document.getElementById('comments');
  if (!container) return;

  container.innerHTML = '<div class="comments-loading"><span data-zh="加载评论中" data-en="Loading comments">加载评论中</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span></div>';
  applyLang();

  var script = document.createElement('script');
  script.src = 'https://giscus.app/client.js';
  script.async = true;
  script.crossOrigin = 'anonymous';
  script.setAttribute('data-repo', 'barretlee/metacognition');
  script.setAttribute('data-repo-id', 'R_kgDOScmq9A');
  script.setAttribute('data-category', 'General');
  script.setAttribute('data-category-id', 'DIC_kwDOScmq9M4C9AvN');
  script.setAttribute('data-mapping', 'specific');
  script.setAttribute('data-term', slug);
  script.setAttribute('data-strict', '0');
  script.setAttribute('data-reactions-enabled', '1');
  script.setAttribute('data-emit-metadata', '0');
  script.setAttribute('data-input-position', 'bottom');
  script.setAttribute('data-theme', 'preferred_color_scheme');
  script.setAttribute('data-lang', 'zh-CN');
  script.setAttribute('data-loading', 'lazy');
  script.onload = function() { commentsLoaded = true; };
  script.onerror = function() {
    container.innerHTML = '<div class="comments-loading"><span data-zh="评论加载失败，请刷新后重试" data-en="Comments failed. Refresh and retry.">评论加载失败，请刷新后重试</span><br><span style="font-size:0.7rem;color:var(--text-muted)" data-zh="首次使用需在弹窗中授权 Giscus GitHub App" data-en="First use requires authorizing the Giscus GitHub App"></span></div>';
    applyLang();
  };
  container.appendChild(script);
}

// ── Init ──
document.getElementById('lang-toggle').addEventListener('click', toggleLang);
document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
document.getElementById('search-btn').addEventListener('click', openSearch);
document.getElementById('search-close').addEventListener('click', closeSearch);
document.getElementById('search-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeSearch();
});
document.getElementById('search-input').addEventListener('input', debounce(doSearch, 200));
document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
  if (e.key === 'Escape') closeSearch();
});
initTheme();
initLang();

// ── Resolve slug from URL or sessionStorage ──
function getSlugFromURL() {
  // sessionStorage pass from 404.html (no ?p= flash)
  // Format: "slug" for zh, "en:slug" for en
  var ss = sessionStorage.getItem('mc-article');
  if (ss) {
    sessionStorage.removeItem('mc-article');
    if (ss.startsWith('en:')) {
      currentLang = 'en'; setCookie('mc-lang', 'en', 365); applyLang();
      return ss.substring(3);
    }
    return ss;
  }
  // Backward compat: ?p= or ?edition=
  const params = new URLSearchParams(window.location.search);
  let p = params.get('p') || params.get('edition');
  if (p) return p;
  // Path-based: /metacognition/{slug} or /metacognition/en/{slug}
  let path = window.location.pathname.replace(/\/metacognition\//, '').replace(/\/$/, '');
  if (path.startsWith('en/')) {
    currentLang = 'en'; setCookie('mc-lang', 'en', 365); applyLang();
    return path.substring(3);
  }
  if (path && path !== 'index.html') return path;
  return null;
}

fetch(BASE_PATH + 'editions.json')
  .then(r => r.json())
  .then(data => {
    buildIndex(data.editions);
    const fromURL = getSlugFromURL();
    if (fromURL) {
      // Match by slug_en or slug
      const ed = data.editions.find(e => e.slug_en === fromURL || e.slug === fromURL);
      if (ed) loadEdition(ed.slug);
    }
  })
  .catch(() => {
    document.getElementById('loading').innerHTML = '<span data-zh="加载失败" data-en="Load failed">加载失败</span>';
    applyLang();
  });

window.addEventListener('popstate', () => {
  const fromURL = getSlugFromURL();
  if (fromURL && editions.length) {
    const ed = editions.find(e => e.slug_en === fromURL || e.slug === fromURL);
    ed ? loadEdition(ed.slug) : buildIndex(editions);
  } else {
    buildIndex(editions);
  }
});

// ── Search ──
let searchIndex = null;

async function openSearch() {
  document.getElementById('search-overlay').classList.remove('hidden');
  document.getElementById('search-input').focus();
  // Load index on demand
  if (!searchIndex) {
    try {
      const r = await fetch(BASE_PATH + 'search-index.json');
      searchIndex = await r.json();
    } catch(e) {}
  }
}

function closeSearch() {
  document.getElementById('search-overlay').classList.add('hidden');
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML = '<div class="search-empty" data-zh="输入关键词开始搜索" data-en="Type to search">输入关键词开始搜索</div>';
  applyLang();
  document.getElementById('search-count').textContent = '0';
}

function doSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const resultsEl = document.getElementById('search-results');
  if (!q || !searchIndex) {
    resultsEl.innerHTML = '<div class="search-empty" data-zh="输入关键词开始搜索" data-en="Type to search">输入关键词开始搜索</div>';
    applyLang();
    document.getElementById('search-count').textContent = '0';
    return;
  }

  const results = searchIndex.filter(item => {
    const haystack = [item.title, item.title_en, ...item.tags, ...item.tags_en, item.excerpt || '', item.excerpt_en || ''].join(' ').toLowerCase();
    return haystack.includes(q);
  });

  document.getElementById('search-count').textContent = results.length;

  if (!results.length) {
    resultsEl.innerHTML = '<div class="search-empty" data-zh="无匹配结果" data-en="No results">无匹配结果</div>';
    applyLang();
    return;
  }

  resultsEl.innerHTML = results.map(r => {
    const title = currentLang === 'en' ? r.title_en : r.title;
    const excerpt = currentLang === 'en' ? (r.excerpt_en || r.excerpt) : (r.excerpt || r.excerpt_en || '');
    const hrefSlug = r.slug_en || r.slug;
    const langPfx = currentLang === 'en' ? 'en/' : '';
    return `<a href="${BASE_PATH}${langPfx}${hrefSlug}" class="search-result" onclick="event.preventDefault();closeSearch();loadEdition('${r.slug}')">
      <div class="search-result-title">${highlight(title, q)}</div>
      <div class="search-result-excerpt">${highlight(excerpt.substring(0, 150), q)}</div>
      <div class="search-result-meta">${r.dateDisplay}</div>
    </a>`;
  }).join('');
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function debounce(fn, ms) {
  let t;
  return function() { clearTimeout(t); t = setTimeout(() => fn.apply(this, arguments), ms); };
}
</script>

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/metacognition/sw.js');
}
</script>
