<!DOCTYPE html>
<html><head><meta charset="utf-8"><script>
// SPA fallback: pass path via sessionStorage, redirect to clean root
(function(){
  var path = window.location.pathname.replace(/\/metacognition\//, '').replace(/\/$/, '');
  if (path && path !== 'index.html' && path !== '404.html') {
    sessionStorage.setItem('mc-article', path);
    window.location.replace('/metacognition/');
  }
})();
</script></head></html>
