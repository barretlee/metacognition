<!DOCTYPE html>
<html><head><meta charset="utf-8"><script>
// SPA fallback: redirect /metacognition/anything → /metacognition/?p=/anything
var path = sessionStorage.getItem('mc-redirect') || '';
sessionStorage.removeItem('mc-redirect');
if (!path) {
  path = window.location.pathname.replace(/\/metacognition\//, '') || '';
  sessionStorage.setItem('mc-redirect', path);
}
window.location.replace('/metacognition/' + (path ? '?p=' + encodeURIComponent(path) : ''));
</script></head></html>
