<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 Metacognition — 破界日报</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Serif:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  /* ── Dark Theme (default) ── */
  :root, [data-theme="dark"] {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface-hover: #242424;
    --text: #e8e4dd;
    --text-secondary: #8a857c;
    --text-muted: #5c5852;
    --accent: #c9a96e;
    --accent-glow: rgba(201, 169, 110, 0.15);
    --border: #2a2a2a;
    --tag-bg: rgba(201, 169, 110, 0.1);
    --tag-text: #c9a96e;
    --gradient-1: #c9a96e;
    --gradient-2: #8b7355;
    --toggle-bg: #1a1a1a;
    --toggle-border: #2a2a2a;
  }

  /* ── Light Theme ── */
  [data-theme="light"] {
    --bg: #faf8f5;
    --surface: #ffffff;
    --surface-hover: #f5f2ed;
    --text: #1a1815;
    --text-secondary: #6b6358;
    --text-muted: #9b9388;
    --accent: #8b6914;
    --accent-glow: rgba(139, 105, 20, 0.08);
    --border: #e8e4dd;
    --tag-bg: rgba(139, 105, 20, 0.08);
    --tag-text: #8b6914;
    --gradient-1: #8b6914;
    --gradient-2: #5c4a1e;
    --toggle-bg: #ffffff;
    --toggle-border: #d4cfc6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', 'Noto Serif', Georgia, 'Times New Roman', serif;
    line-height: 1.8;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* ── Hero ── */
  .hero {
    position: relative;
    padding: 120px 24px 80px;
    text-align: center;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 50% 30%, var(--accent-glow) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(139, 115, 85, 0.08) 0%, transparent 50%);
    animation: heroGlow 8s ease-in-out infinite alternate;
  }

  @keyframes heroGlow {
    0% { transform: scale(1) translate(0, 0); opacity: 0.8; }
    100% { transform: scale(1.1) translate(-2%, -2%); opacity: 1; }
  }

  .hero-content { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; }

  .hero-badge {
    display: inline-block;
    padding: 6px 16px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 32px;
    backdrop-filter: blur(12px);
  }

  .hero h1 {
    font-size: clamp(2.2rem, 5vw, 3.6rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.25;
    margin-bottom: 20px;
    background: linear-gradient(135deg, var(--text) 0%, var(--text-secondary) 60%, var(--gradient-1) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-subtitle {
    font-size: 1.1rem;
    color: var(--text-secondary);
    max-width: 500px;
    margin: 0 auto 36px;
  }

  .hero-quote {
    font-style: italic;
    color: var(--text-muted);
    font-size: 0.95rem;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    max-width: 440px;
    margin: 0 auto;
  }

  /* ── Navigation ── */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13, 13, 13, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    transition: background 0.3s;
  }

  [data-theme="light"] .nav {
    background: rgba(250, 248, 245, 0.85);
  }

  .nav-inner {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    gap: 12px;
  }

  .nav-brand {
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.85rem;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-decoration: none;
    white-space: nowrap;
  }

  .nav-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-links {
    display: flex;
    gap: 16px;
    list-style: none;
    align-items: center;
  }

  .nav-links a {
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.75rem;
    color: var(--text-secondary);
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--text); }

  /* ── Toggle Buttons ── */
  .toggle-btn {
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.7rem;
    background: var(--toggle-bg);
    color: var(--text-secondary);
    border: 1px solid var(--toggle-border);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .toggle-btn:hover {
    color: var(--text);
    border-color: var(--accent);
  }

  .toggle-btn.active {
    color: var(--accent);
    border-color: var(--accent);
  }

  /* ── Main Layout ── */
  .main { max-width: 800px; margin: 0 auto; padding: 0 24px 80px; }

  /* ── Edition Cards ── */
  .section-header {
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin: 60px 0 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .edition-card {
    display: block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 32px;
    margin-bottom: 12px;
    text-decoration: none;
    transition: all 0.25s ease;
    cursor: pointer;
  }

  .edition-card:hover {
    border-color: var(--accent);
    background: var(--surface-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }

  .edition-number {
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .edition-title {
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .edition-meta {
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .edition-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 14px;
  }

  .tag {
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.68rem;
    padding: 3px 10px;
    background: var(--tag-bg);
    color: var(--tag-text);
    border-radius: 100px;
  }

  /* ── Article View ── */
  .article { animation: fadeIn 0.5s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .article-header {
    padding: 60px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }

  .article-number {
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.12em;
    margin-bottom: 12px;
  }

  .article-header h1 {
    font-size: clamp(1.6rem, 3.5vw, 2.4rem);
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 16px;
  }

  .article-date {
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  .article-body h2 {
    font-size: 1.35rem;
    font-weight: 600;
    margin: 48px 0 16px;
    color: var(--text);
    scroll-margin-top: 80px;
  }

  .article-body h3 {
    font-size: 1.1rem;
    font-weight: 600;
    margin: 32px 0 12px;
    color: var(--accent);
  }

  .article-body p {
    margin-bottom: 16px;
    color: var(--text-secondary);
  }

  .article-body strong {
    color: var(--text);
    font-weight: 600;
  }

  .article-body blockquote {
    border-left: 3px solid var(--accent);
    padding: 12px 20px;
    margin: 24px 0;
    background: var(--surface);
    border-radius: 0 8px 8px 0;
    color: var(--text-secondary);
    font-style: italic;
  }

  .article-body blockquote strong {
    color: var(--accent);
  }

  .article-body code {
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.85em;
    background: var(--surface);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--accent);
  }

  .article-body pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    margin: 20px 0;
    overflow-x: auto;
  }

  .article-body pre code {
    background: none;
    padding: 0;
    color: var(--text);
    font-size: 0.85rem;
    line-height: 1.7;
  }

  .article-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 40px 0;
  }

  .article-body ul, .article-body ol {
    margin: 12px 0 20px 24px;
    color: var(--text-secondary);
  }

  .article-body li { margin-bottom: 8px; }

  .article-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 24px 0;
    font-size: 0.9rem;
  }

  .article-body th {
    text-align: left;
    padding: 10px 14px;
    border-bottom: 2px solid var(--accent);
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    color: var(--accent);
  }

  .article-body td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text-secondary);
  }

  .article-body a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dotted var(--accent);
  }

  .article-body a:hover { border-bottom-style: solid; }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.8rem;
    color: var(--text-muted);
    text-decoration: none;
    margin-bottom: 24px;
    transition: color 0.2s;
  }

  .back-link:hover { color: var(--text); }

  /* ── Language separator in article ── */
  .lang-section { display: none; }
  .lang-section.active { display: block; }

  .lang-divider {
    margin: 60px 0;
    border: none;
    border-top: 2px dashed var(--border);
    position: relative;
    text-align: center;
  }

  .lang-divider::after {
    content: attr(data-label);
    position: relative;
    top: -0.7em;
    background: var(--bg);
    padding: 0 16px;
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.12em;
  }

  /* ── Footer ── */
  .footer {
    max-width: 800px;
    margin: 0 auto;
    padding: 60px 24px 40px;
    border-top: 1px solid var(--border);
    text-align: center;
  }

  .footer-inner {
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.72rem;
    color: var(--text-muted);
  }

  .footer-inner a {
    color: var(--accent);
    text-decoration: none;
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .hero { padding: 80px 20px 60px; }
    .main { padding: 0 16px 60px; }
    .edition-card { padding: 20px 20px; }
    .article-header { padding: 40px 0 28px; }
    .article-body h2 { font-size: 1.2rem; }
    .nav-inner { gap: 6px; }
    .nav-links { gap: 10px; }
    .toggle-btn { padding: 4px 7px; font-size: 0.65rem; }
  }

  /* ── Loading & Empty ── */
  .loading {
    text-align: center;
    padding: 80px 0;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    font-size: 0.85rem;
  }

  .loading-dot {
    display: inline-block;
    animation: dotPulse 1.4s infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(4) { animation-delay: 0.4s; }

  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.3; }
    40% { opacity: 1; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- Hero -->
<section class="hero">
  <div class="hero-content">
    <div class="hero-badge" data-zh="每日破界 · Daily Edition" data-en="Daily Edition · Break Your Bubble">每日破界 · Daily Edition</div>
    <h1>Metacognition</h1>
    <p class="hero-subtitle" data-zh="破界日报 — 每天一件认知之外的事。认知科学、哲学、投资、陌生领域，跳出思维舒适区。" data-en="Daily cognitive horizon expansion. Science, philosophy, investing, unfamiliar domains — one eye-opening read at a time.">破界日报 — 每天一件认知之外的事。认知科学、哲学、投资、陌生领域，跳出思维舒适区。</p>
    <p class="hero-quote" data-zh="“认知的边界，不在于知道多少，而在于敢于面对多少未知。”" data-en="“The boundary of cognition is not how much you know, but how much unknown you dare to face.”">“认知的边界，不在于知道多少，而在于敢于面对多少未知。”</p>
  </div>
</section>

<!-- Navigation -->
<nav class="nav">
  <div class="nav-inner">
    <a href="/metacognition/" class="nav-brand">🔮 Metacognition</a>
    <div class="nav-group">
      <ul class="nav-links">
        <li><a href="/metacognition/" data-zh="目录" data-en="Index">目录</a></li>
        <li><a href="https://github.com/barretlee/metacognition" target="_blank">GitHub</a></li>
      </ul>
      <button class="toggle-btn" id="lang-toggle" data-lang="zh" title="Switch language / 切换语言">中</button>

<!-- Main -->
<main class="main" id="main">
  <div class="loading" id="loading">
    <span data-zh="加载中" data-en="Loading">加载中</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span>
  </div>

  <!-- Index View -->
  <div id="index-view" class="hidden">
    <div class="section-header" data-zh="Editions · 期数" data-en="Editions">Editions · 期数</div>

<footer class="footer">
  <div class="footer-inner">
    <span data-zh="由" data-en="Built by ">由</span> <a href="https://github.com/barretlee">Barret Lee</a> · <a href="https://github.com/barretlee/metacognition">metacognition</a>
  </div>
</footer>

<script>
// ── State ──
const BASE_PATH = '/metacognition/';
let currentLang = 'zh';
let currentTheme = 'dark';
let editions = [];

// ── Cookie helpers ──
function setCookie(name, value, days) {
  const d = new Date();
  d.setTime(d.getTime() + (days * 86400000));
  document.cookie = name + '=' + value + ';path=/;expires=' + d.toUTCString() + ';SameSite=Lax';
}

function getCookie(name) {
  const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
  return match ? match[2] : null;
}

// ── Init language from cookie or browser ──
function initLang() {
  const saved = getCookie('mc-lang');
  if (saved === 'zh' || saved === 'en') {
    currentLang = saved;
  } else {
    const browserLang = navigator.language || navigator.userLanguage || '';
    currentLang = browserLang.startsWith('zh') ? 'zh' : 'en';
  }
  applyLang();
}

function toggleLang() {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  setCookie('mc-lang', currentLang, 365);
  applyLang();
  if (document.getElementById('index-view').classList.contains('hidden') === false) {
    buildIndex(editions);
  }
}

function applyLang() {
  document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
  document.querySelectorAll('[data-zh][data-en]').forEach(el => {
    el.textContent = el.getAttribute('data-' + currentLang);
  });

  // Lang toggle display
  const btn = document.getElementById('lang-toggle');
  btn.textContent = currentLang === 'zh' ? '中' : 'En';
  btn.setAttribute('data-lang', currentLang);

  // Show/hide language sections in article
  document.querySelectorAll('.lang-section').forEach(sec => {
    sec.classList.toggle('active', sec.getAttribute('data-lang') === currentLang);
  });
}

// ── Theme ──
function initTheme() {
  const saved = getCookie('mc-theme');
  if (saved === 'light' || saved === 'dark') {
    currentTheme = saved;
  } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
    currentTheme = 'light';
  }
  applyTheme();
  // Listen for system changes
  if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      if (!getCookie('mc-theme')) {
        currentTheme = e.matches ? 'dark' : 'light';
        applyTheme();
      }
    });
  }
}

function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  setCookie('mc-theme', currentTheme, 365);
  applyTheme();
}

function applyTheme() {
  document.documentElement.setAttribute('data-theme', currentTheme);
  const btn = document.getElementById('theme-toggle');
  btn.textContent = currentTheme === 'dark' ? '☀' : '☾';
}

// ── Markdown parser (simple) ──
function parseMarkdown(md) {
  let html = md
    // Headers
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    // Bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Code blocks
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    // Links
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    // Blockquotes
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    // Horizontal rules
    .replace(/^---$/gm, '<hr>')
    // Unordered lists
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    // Ordered lists
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    // Wrap list items in ul
    .replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')
    // Merge consecutive blockquotes
    .replace(/<\/blockquote>\n<blockquote>/g, '<br>')
    // Empty paragraphs
    .replace(/\n\n/g, '</p><p>')
    // Single newlines
    .replace(/\n/g, '<br>');

  // Wrap in paragraphs
  html = '<p>' + html + '</p>';
  // Clean up empty paragraphs and double-wrapped lists
  html = html.replace(/<p><ul>/g, '<ul>').replace(/<\/ul><\/p>/g, '</ul>');
  html = html.replace(/<p><blockquote>/g, '<blockquote>').replace(/<\/blockquote><\/p>/g, '</blockquote>');
  html = html.replace(/<p><h([23])>/g, '<h$1>').replace(/<\/h([23])><\/p>/g, '</h$1>');
  html = html.replace(/<p><hr><\/p>/g, '<hr>');
  html = html.replace(/<p>\s*<\/p>/g, '');

  return html;
}

// ── Frontmatter parser ──
function parseFrontmatter(md) {
  const match = md.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (!match) return { meta: {}, body: md };
  const meta = {};
  match[1].split('\n').forEach(line => {
    const m = line.match(/^(\w+):\s*(.+)$/);
    if (m) {
      const key = m[1];
      let val = m[2].trim();
      if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1);
      if (key === 'tags' || key === 'tags_en') {
        val = val.replace(/[\[\]]/g, '').split(',').map(s => s.trim().replace(/['"]/g, ''));
      }
      meta[key] = val;
    }
  });
  return { meta, body: match[2].trim() };
}

// ── Router ──
function buildIndex(eds) {
  editions = eds;
  const list = document.getElementById('edition-list');
  list.innerHTML = eds
    .sort((a, b) => b.date.localeCompare(a.date))
    .map(e => {
      const title = currentLang === 'en' && e.title_en ? e.title_en : e.title;
      const tags = currentLang === 'en' && e.tags_en ? e.tags_en : e.tags;
      return `
      <a href="/metacognition/?edition=${e.slug}" class="edition-card" onclick="event.preventDefault(); loadEdition('${e.slug}')">
        <div class="edition-number">#${String(e.num).padStart(3, '0')} · ${e.dateDisplay}</div>
        <div class="edition-title">${title}</div>
        <div class="edition-tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </a>`;
    }).join('');

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('index-view').classList.remove('hidden');
  document.getElementById('article-view').classList.add('hidden');
  window.scrollTo(0, 0);
}

async function loadEdition(slug) {
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('index-view').classList.add('hidden');
  document.getElementById('article-view').classList.add('hidden');

  try {
    const resp = await fetch(BASE_PATH + 'issues/' + slug + '.md');
    if (!resp.ok) throw new Error('Edition not found');
    const md = await resp.text();
    const { meta, body } = parseFrontmatter(md);

    // Split Chinese and English sections
    const parts = body.split(/^## EN\b/m);
    const zhBody = parts[0].trim();
    const enBody = parts.length > 1 ? parts[1].trim() : '';

    const title = currentLang === 'en' && meta.title_en ? meta.title_en : (meta.title || slug);
    const tags = currentLang === 'en' && meta.tags_en ? meta.tags_en : (meta.tags || []);
    const edMeta = editions.find(e => e.slug === slug);
    const dateDisplay = edMeta ? edMeta.dateDisplay : meta.date || slug;

    const tagsHTML = tags.length ? `<div class="edition-tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : '';

    let bodyHTML = '';
    if (enBody) {
      bodyHTML = `
        <div class="lang-section active" data-lang="zh">${parseMarkdown(zhBody)}</div>
        <hr class="lang-divider" data-label="ENGLISH EDITION">
        <div class="lang-section" data-lang="en">${parseMarkdown(enBody)}</div>`;
    } else {
      bodyHTML = parseMarkdown(zhBody);
    }

    const numStr = meta.edition ? '#' + String(meta.edition).padStart(3, '0') : '';

    document.getElementById('article-view').innerHTML = `
      <a href="/metacognition/" class="back-link" onclick="event.preventDefault(); buildIndex(editions)">
        <span data-zh="← 返回目录" data-en="← Back to Index">← 返回目录</span>
      </a>
      <article class="article">
        <div class="article-header">
          <div class="article-number">Edition ${numStr}</div>
          <h1>${title}</h1>
          <div class="article-date">${dateDisplay}</div>
          ${tagsHTML}
        </div>
        <div class="article-body">${bodyHTML}</div>
      </article>`;

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('article-view').classList.remove('hidden');
    applyLang(); // Re-apply after dynamic content
    window.scrollTo(0, 0);

    // Update URL
    if (history.pushState) {
      history.pushState(null, '', BASE_PATH + '?edition=' + slug);
    }
  } catch (err) {
    document.getElementById('loading').innerHTML = '<span data-zh="加载失败，请稍后再试" data-en="Failed to load, please try again">加载失败，请稍后再试</span>';
    applyLang();
  }
}

// ── Init ──
document.getElementById('lang-toggle').addEventListener('click', toggleLang);
document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

initTheme();
initLang();

// Load editions
fetch(BASE_PATH + 'editions.json')
  .then(r => r.json())
  .then(data => {
    buildIndex(data.editions);
    // Check URL for direct edition link
    const params = new URLSearchParams(window.location.search);
    const editionSlug = params.get('edition');
    if (editionSlug) {
      loadEdition(editionSlug);
    }
  })
  .catch(() => {
    document.getElementById('loading').innerHTML = '<span data-zh="加载失败，请稍后再试" data-en="Failed to load, please try again">加载失败，请稍后再试</span>';
    applyLang();
  });

// Handle browser back/forward
window.addEventListener('popstate', () => {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('edition');
  if (slug) {
    loadEdition(slug);
  } else {
    buildIndex(editions);
  }
});
</script>
</body>
