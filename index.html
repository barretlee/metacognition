<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 Metacognition — 破界日报</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface-hover: #242424;
    --text: #e8e4dd;
    --text-secondary: #8a857c;
    --text-muted: #5c5852;
    --accent: #c9a96e;
    --accent-glow: rgba(201, 169, 110, 0.15);
    --border: #2a2a2a;
    --tag-bg: rgba(201, 169, 110, 0.1);
    --tag-text: #c9a96e;
    --gradient-1: #c9a96e;
    --gradient-2: #8b7355;
    --font-serif: 'Noto Serif SC', Georgia, 'Times New Roman', serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-serif);
    line-height: 1.8;
    min-height: 100vh;
  }

  /* ── Hero ── */
  .hero {
    position: relative;
    padding: 120px 24px 80px;
    text-align: center;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 50% 30%, var(--accent-glow) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(139, 115, 85, 0.08) 0%, transparent 50%);
    animation: heroGlow 8s ease-in-out infinite alternate;
  }

  @keyframes heroGlow {
    0% { transform: scale(1) translate(0, 0); opacity: 0.8; }
    100% { transform: scale(1.1) translate(-2%, -2%); opacity: 1; }
  }

  .hero-content { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; }

  .hero-badge {
    display: inline-block;
    padding: 6px 16px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 32px;
    backdrop-filter: blur(12px);
  }

  .hero h1 {
    font-size: clamp(2.2rem, 5vw, 3.6rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.25;
    margin-bottom: 20px;
    background: linear-gradient(135deg, var(--text) 0%, var(--text-secondary) 60%, var(--gradient-1) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-subtitle {
    font-size: 1.1rem;
    color: var(--text-secondary);
    max-width: 500px;
    margin: 0 auto 36px;
  }

  .hero-quote {
    font-style: italic;
    color: var(--text-muted);
    font-size: 0.95rem;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    max-width: 440px;
    margin: 0 auto;
  }

  /* ── Navigation ── */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13, 13, 13, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .nav-inner {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
  }

  .nav-brand {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 24px;
    list-style: none;
  }

  .nav-links a {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    color: var(--text-secondary);
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--text); }

  /* ── Main Layout ── */
  .main { max-width: 800px; margin: 0 auto; padding: 0 24px 80px; }

  /* ── Edition Cards ── */
  .section-header {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin: 60px 0 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .edition-card {
    display: block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 32px;
    margin-bottom: 12px;
    text-decoration: none;
    transition: all 0.25s ease;
    cursor: pointer;
  }

  .edition-card:hover {
    border-color: var(--accent);
    background: var(--surface-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .edition-number {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .edition-title {
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .edition-meta {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text-muted);
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .edition-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 14px;
  }

  .tag {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    padding: 3px 10px;
    background: var(--tag-bg);
    color: var(--tag-text);
    border-radius: 100px;
  }

  /* ── Article View ── */
  .article { animation: fadeIn 0.5s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .article-header {
    padding: 60px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }

  .article-number {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.12em;
    margin-bottom: 12px;
  }

  .article-header h1 {
    font-size: clamp(1.6rem, 3.5vw, 2.4rem);
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 16px;
  }

  .article-date {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  .article-body h2 {
    font-size: 1.35rem;
    font-weight: 600;
    margin: 48px 0 16px;
    color: var(--text);
    scroll-margin-top: 80px;
  }

  .article-body h3 {
    font-size: 1.1rem;
    font-weight: 600;
    margin: 32px 0 12px;
    color: var(--accent);
  }

  .article-body p {
    margin-bottom: 16px;
    color: var(--text-secondary);
  }

  .article-body strong {
    color: var(--text);
    font-weight: 600;
  }

  .article-body blockquote {
    border-left: 3px solid var(--accent);
    padding: 12px 20px;
    margin: 24px 0;
    background: var(--surface);
    border-radius: 0 8px 8px 0;
    color: var(--text-secondary);
    font-style: italic;
  }

  .article-body blockquote strong {
    color: var(--accent);
  }

  .article-body code {
    font-family: var(--font-mono);
    font-size: 0.85em;
    background: var(--surface);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--accent);
  }

  .article-body pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    margin: 20px 0;
    overflow-x: auto;
  }

  .article-body pre code {
    background: none;
    padding: 0;
    color: var(--text);
    font-size: 0.85rem;
    line-height: 1.7;
  }

  .article-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 40px 0;
  }

  .article-body ul, .article-body ol {
    margin: 12px 0 20px 24px;
    color: var(--text-secondary);
  }

  .article-body li { margin-bottom: 8px; }

  .article-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 24px 0;
    font-size: 0.9rem;
  }

  .article-body th {
    text-align: left;
    padding: 10px 14px;
    border-bottom: 2px solid var(--accent);
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    color: var(--accent);
  }

  .article-body td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text-secondary);
  }

  .article-body a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dotted var(--accent);
  }

  .article-body a:hover { border-bottom-style: solid; }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--text-muted);
    text-decoration: none;
    margin-bottom: 24px;
    transition: color 0.2s;
  }

  .back-link:hover { color: var(--text); }

  /* ── Footer ── */
  .footer {
    max-width: 800px;
    margin: 0 auto;
    padding: 60px 24px 40px;
    border-top: 1px solid var(--border);
    text-align: center;
  }

  .footer-inner {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--text-muted);
  }

  .footer-inner a {
    color: var(--accent);
    text-decoration: none;
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .hero { padding: 80px 20px 60px; }
    .main { padding: 0 16px 60px; }
    .edition-card { padding: 20px 20px; }
    .article-header { padding: 40px 0 28px; }
    .article-body h2 { font-size: 1.2rem; }
  }

  /* ── Loading & Empty ── */
  .loading {
    text-align: center;
    padding: 80px 0;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 0.85rem;
  }

  .loading-dot {
    display: inline-block;
    animation: dotPulse 1.4s infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.3; }
    40% { opacity: 1; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- Hero -->
<section class="hero">
  <div class="hero-content">
    <div class="hero-badge">Daily Edition · 每日 10:00</div>
    <h1>Metacognition</h1>
    <p class="hero-subtitle">破界日报 — 每天一件你认知之外的事。认知科学、哲学、投资、陌生领域，带你跳出舒适区。</p>
    <p class="hero-quote">"一个人的认知边界，不是他知道了多少，而是他敢于面对多少自己不知道的东西。"</p>
  </div>
</section>

<!-- Navigation -->
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand">🔮 Metacognition</a>
    <ul class="nav-links">
      <li><a href="/">目录</a></li>
      <li><a href="https://github.com/barretlee/metacognition" target="_blank">GitHub</a></li>
    </ul>
  </div>
</nav>

<!-- Main -->
<main class="main" id="main">
  <div class="loading" id="loading">
    加载中<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span>
  </div>

  <!-- Index View -->
  <div id="index-view" class="hidden">
    <div class="section-header">Editions · 期数</div>
    <div id="edition-list"></div>
  </div>

  <!-- Article View -->
  <div id="article-view" class="hidden"></div>
</main>

<!-- Footer -->
<footer class="footer">
  <div class="footer-inner">
    Built by <a href="https://github.com/barretlee">Barret Lee</a> · <a href="https://github.com/barretlee/metacognition">metacognition</a>
  </div>
</footer>

<script>
// ── Router ──
const EDITIONS = [];

function buildIndex(editions) {
  const list = document.getElementById('edition-list');
  list.innerHTML = editions
    .sort((a, b) => b.date.localeCompare(a.date))
    .map(e => `
      <a href="/?edition=${e.slug}" class="edition-card" onclick="event.preventDefault(); loadEdition('${e.slug}')">
        <div class="edition-number">#${String(e.num).padStart(3, '0')} · ${e.dateDisplay}</div>
        <div class="edition-title">${e.title}</div>
        <div class="edition-tags">${e.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </a>
    `).join('');
}

function showLoading() {
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('index-view').classList.add('hidden');
  document.getElementById('article-view').classList.add('hidden');
}

function showIndex() {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('index-view').classList.remove('hidden');
  document.getElementById('article-view').classList.add('hidden');
  window.history.pushState({}, '', '/');
}

function markdownToHTML(md) {
  let html = md;

  // Remove YAML frontmatter
  html = html.replace(/^---[\s\S]*?---\n?/, '');

  // Headings
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Horizontal rules
  html = html.replace(/^---$/gm, '<hr>');

  // Bold and italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');

  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Images
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:8px;margin:16px 0;">');

  // Tables
  html = html.replace(/^\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)*)/gm, (match, header, body) => {
    const headers = header.split('|').map(h => h.trim()).filter(Boolean);
    const rows = body.trim().split('\n').map(row =>
      row.split('|').map(c => c.trim()).filter(Boolean)
    );
    const thead = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
    const tbody = rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('');
    return `<table><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
  });

  // Unordered lists
  html = html.replace(/^(?:- |\* )(.*)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

  // Blockquotes
  html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  html = html.replace(/<\/blockquote>\n<blockquote>/g, '<br>');

  // Paragraphs — wrap remaining text lines
  html = html.replace(/^(?!<[a-z]|$)(.+)$/gm, '<p>$1</p>');

  // Clean up empty paragraphs
  html = html.replace(/<p>\s*<\/p>/g, '');

  // Clean up nested <p> in blockquote
  html = html.replace(/<blockquote><p>(.+?)<\/p><\/blockquote>/g, '<blockquote>$1</blockquote>');

  return html;
}

function parseFrontmatter(md) {
  const match = md.match(/^---\n([\s\S]*?)\n---/);
  if (!match) return {};
  const lines = match[1].split('\n');
  const data = {};
  for (const line of lines) {
    const kv = line.match(/^(\w+):\s*(.+)$/);
    if (kv) {
      const key = kv[1];
      let val = kv[2].trim();
      if (val.startsWith('[') && val.endsWith(']')) {
        val = val.slice(1, -1).split(',').map(s => s.trim());
      }
      data[key] = val;
    }
  }
  return data;
}

async function loadEdition(slug) {
  showLoading();
  try {
    const resp = await fetch(`issues/${slug}.md`);
    const md = await resp.text();
    const fm = parseFrontmatter(md);
    const html = markdownToHTML(md);

    const container = document.getElementById('article-view');
    container.innerHTML = `
      <div class="article">
        <a href="/" class="back-link" onclick="event.preventDefault(); showIndex()">← 返回目录</a>
        <div class="article-header">
          <div class="article-number">Edition #${String(fm.edition || '—').padStart(3, '0')}</div>
          <h1>${fm.title || 'Untitled'}</h1>
          <div class="article-date">${fm.date || ''}</div>
        </div>
        <div class="article-body">${html}</div>
        <div style="margin-top:60px;padding-top:40px;border-top:1px solid var(--border);">
          <a href="/" class="back-link" onclick="event.preventDefault(); showIndex()">← 返回目录</a>
        </div>
      </div>
    `;

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('index-view').classList.add('hidden');
    container.classList.remove('hidden');
    window.history.pushState({}, '', `/?edition=${slug}`);
    window.scrollTo(0, 0);
  } catch (e) {
    console.error('Failed to load edition:', e);
    showIndex();
  }
}

// ── Init ──
async function init() {
  try {
    // Fetch editions index
    const resp = await fetch('editions.json');
    const data = await resp.json();
    data.editions.forEach(e => EDITIONS.push(e));
    buildIndex(EDITIONS);

    // Check if URL has edition param
    const params = new URLSearchParams(window.location.search);
    const editionSlug = params.get('edition');
    if (editionSlug) {
      loadEdition(editionSlug);
    } else {
      showIndex();
    }
  } catch (e) {
    console.error('Failed to load editions:', e);
    document.getElementById('loading').innerHTML = '加载失败，请刷新页面重试。';
  }
}

init();
</script>
</body>
</html>
